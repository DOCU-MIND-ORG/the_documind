spring.application.name=DocMind

# Import .env file when running from either backend/ or the repository root.
spring.config.import=optional:file:.env[.properties],optional:file:backend/.env[.properties]

# Database Connection
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Storage for static files
app.storage.root=storage

# Backend Security
SECRET_KEY_BACKEND=${JWT_SECRET}

# Hikari Connection Pool Settings
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=10000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000

# ==========================================================
# Spring AI Gemini Configuration
# ==========================================================
spring.ai.google.genai.api-key=${GEMINI_API_KEY}
spring.ai.google.genai.project-id=docmind
spring.ai.google.genai.chat.model=gemini-3.1-flash-lite
spring.ai.google.genai.chat.options.model=gemini-3.1-flash-lite

# ==========================================================
# Spring AI Pinecone Configuration
# ==========================================================
spring.ai.vectorstore.pinecone.api-key=${PINECONE_API_KEY}
spring.ai.vectorstore.pinecone.index-name=pluto
spring.ai.vectorstore.pinecone.namespace=default
#for mail
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
